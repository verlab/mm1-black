; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:denky32]
platform = espressif32
board = denky32
framework = arduino
monitor_speed = 115200
; Upload mais rápido após a 1.ª gravação (ajuste se falhar: 460800 ou 115200).
upload_speed = 921600
; huge_app.csv gives 3 MB for the app (instead of default 1.25 MB).
; The ESP32 CYD has a 4 MB flash chip, so this fits fine.
board_build.partitions = huge_app.csv
; TFT_eSPI: TOUCH_CS must live in libdeps TFT_eSPI/User_Setup.h — pre-script copies include/User_Setup.h each build.
; TFT_eSPI: TOUCH_CS tem de estar em libdeps/.../TFT_eSPI/User_Setup.h — o pre-script copia include/User_Setup.h em cada build.
extra_scripts =
	pre:scripts/pio_tft_setup_copy.py
	pre:scripts/pio_firmware_version.py
	; SAP6 uses BLE GATT (not classic SPP DistoX):
	; pre:scripts/pio_bt_spp_channel1.py
	; pre:scripts/pio_bt_iocap_none.py
; LZR_SHARE_USB_UART=1: laser no mesmo UART0 do conector USB/CH340 (RXD0=GPIO3, TXD0=GPIO1), 9600 8N1.
; Se RX bytes = 0: testar -DLZR_SWAP_RXTX=1 ou conferir TX do módulo -> RX da placa (GPIO3).
; Para UART separada: -DLZR_SHARE_USB_UART=0 -DLZR_PIN_RX=22 -DLZR_PIN_TX=21
; Azimute: default no main.cpp = declinação WMM ~2025 Belo Horizonte (−21.7 °, norte geográfico aprox.).
; Outra cidade: -DAZIMUTH_OFFSET_DEG=...  |  Só norte magnético (bússola): -DAZIMUTH_OFFSET_DEG=0
; Após ajuste na SETUP o valor fica na NVS e passa a mandar sobre o macro.
; Display: original rotation 1. Default TFT_ROTATION=0 (−90°). Upside-down fix: -DTFT_ROTATION=3 (+180°).
; SAP6 BLE (CaveBLE): nome no scan (prefixo SAP6_ obrigatorio no TopoDroid). -DBT_DEVICE_NAME='"SAP6_0001"'
build_flags =
	-I include
	-I src
	-D LV_CONF_INCLUDE_SIMPLE
	-D TFT_ROTATION=0
	-D LZR_SHARE_USB_UART=1
	-D CORE_DEBUG_LEVEL=0
	-D BT_DEVICE_NAME=\"SAP6_0001\"
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	lvgl/lvgl@^8.3.11
	adafruit/Adafruit BNO08x

; Teste laser a 115200 (comum em módulos TTL): acrescente uma linha em build_flags acima:
;	-D LZR_BAUD=115200
