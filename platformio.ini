; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:denky32]
platform = espressif32
board = denky32
framework = arduino
monitor_speed = 115200
; huge_app.csv gives 3 MB for the app (instead of default 1.25 MB).
; The ESP32 CYD has a 4 MB flash chip, so this fits fine.
board_build.partitions = huge_app.csv
; TFT_eSPI compiles touch helpers only if TOUCH_CS is set in User_Setup.h inside the library tree.
; scripts/pio_tft_setup_copy.py copies include/User_Setup.h -> .pio/libdeps/.../TFT_eSPI/ each build.
extra_scripts = pre:scripts/pio_tft_setup_copy.py
; LZR_SHARE_USB_UART=1: laser no mesmo UART0 do conector USB/CH340 (RXD0=GPIO3, TXD0=GPIO1), 9600 8N1.
; Se RX bytes = 0: testar -DLZR_SWAP_RXTX=1 ou conferir TX do módulo -> RX da placa (GPIO3).
; Para UART separada: -DLZR_SHARE_USB_UART=0 -DLZR_PIN_RX=22 -DLZR_PIN_TX=21
build_flags =
	-I src
	-D LV_CONF_INCLUDE_SIMPLE
	-D LZR_SHARE_USB_UART=1
	-D CORE_DEBUG_LEVEL=0
lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	lvgl/lvgl@^8.3.11
	adafruit/Adafruit BNO08x

; Teste laser a 115200 (comum em módulos TTL): acrescente uma linha em build_flags acima:
;	-D LZR_BAUD=115200
