name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build denky32
        run: pio run -e denky32

      - name: Package firmware artifact
        run: |
          mkdir -p dist
          SHA="${GITHUB_SHA::7}"
          OUT="dist/MM1-BLACK-denky32-${SHA}.bin"
          cp .pio/build/denky32/firmware.bin "$OUT"
          sha256sum "$OUT" > "${OUT}.sha256"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: MM1-BLACK-denky32-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 90
