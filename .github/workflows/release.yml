name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build firmware
        env:
          VERSION: ${{ steps.ver.outputs.tag }}
        run: pio run -e denky32

      - name: Package binary (Release asset only — never committed)
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          mkdir -p dist
          OUT="dist/MM1-BLACK-denky32-${TAG}.bin"
          cp .pio/build/denky32/firmware.bin "$OUT"
          sha256sum "$OUT" > "${OUT}.sha256"

      - name: Resolve release notes (English)
        id: notes
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          FILE="docs/releases/${TAG}.md"
          if [ -f "$FILE" ]; then
            echo "path=$FILE" >> "$GITHUB_OUTPUT"
            echo "Using release notes: $FILE"
          else
            echo "No docs/releases/${TAG}.md — falling back to auto-generated notes"
          fi

      - name: Publish GitHub Release (English notes)
        if: steps.notes.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MM1-BLACK-denky32-${{ steps.ver.outputs.tag }}.bin
            dist/MM1-BLACK-denky32-${{ steps.ver.outputs.tag }}.bin.sha256
          body_path: ${{ steps.notes.outputs.path }}

      - name: Publish GitHub Release (auto notes)
        if: steps.notes.outputs.path == ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MM1-BLACK-denky32-${{ steps.ver.outputs.tag }}.bin
            dist/MM1-BLACK-denky32-${{ steps.ver.outputs.tag }}.bin.sha256
          generate_release_notes: true
