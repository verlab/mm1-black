name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container: ghcr.io/platformio/platformio-core:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build firmware
        env:
          VERSION: ${{ steps.ver.outputs.tag }}
        run: pio run -e denky32

      - name: Package binary
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          cp .pio/build/denky32/firmware.bin "MM1-BLACK-denky32-${TAG}.bin"
          sha256sum "MM1-BLACK-denky32-${TAG}.bin" > "MM1-BLACK-denky32-${TAG}.bin.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MM1-BLACK-denky32-${{ steps.ver.outputs.tag }}.bin
            MM1-BLACK-denky32-${{ steps.ver.outputs.tag }}.bin.sha256
          generate_release_notes: true
